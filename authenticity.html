<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALA | CLG Authenticator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'], // Font bergaya terminal/kode
                    },
                    colors: {
                        brand: {
                            black: '#0a0a0a',
                            dark: '#1a1a1a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden; /* Mencegah scroll saat animasi */
        }

        /* Efek Grid Latar Belakang (Tech Vibe) */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Garis Scan Vertikal */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
            animation: scan 3s linear infinite;
            opacity: 0;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        /* Glitch Effect untuk Teks Loading */
        .glitch {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 red;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(28px, 9999px, 86px, 0); }
            20% { clip: rect(69px, 9999px, 30px, 0); }
            40% { clip: rect(22px, 9999px, 98px, 0); }
            60% { clip: rect(98px, 9999px, 45px, 0); }
            80% { clip: rect(12px, 9999px, 66px, 0); }
            100% { clip: rect(54px, 9999px, 12px, 0); }
        }

        /* Transisi Antar Panel */
        .panel {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: scale(0.95);
        }

        .panel.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* Efek Pulsing Badge (Asli/Palsu) */
        .pulse-authentic {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .pulse-fake {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black font-sans relative">

    <!-- Background Elements -->
    <div class="absolute inset-0 bg-grid z-0"></div>
    <div class="scan-line" id="scan-line"></div>

    <!-- Tombol Header / Home (Selalu Ada) -->
    <header class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-50">
        <div class="font-mono text-sm tracking-widest text-gray-500">SYS_AUTH_V2.0</div>
        <a href="index.html" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors group">
            <span class="uppercase tracking-widest text-xs hidden sm:block group-hover:translate-x-1 transition-transform">Return to Store</span>
            <i class="ph ph-arrow-right text-xl group-hover:translate-x-1 transition-transform"></i>
        </a>
    </header>

    <!-- Main Container -->
    <main class="relative w-full h-screen max-w-lg mx-auto z-10 px-6">

        <!-- STEP 1: INPUT KODE -->
        <div id="panel-input" class="panel active">
            <div class="mb-8 w-20 h-20 border border-white/20 rounded-full flex items-center justify-center bg-brand-dark shadow-2xl">
                <i class="ph ph-qr-code text-4xl text-white"></i>
            </div>
            
            <h1 class="text-3xl font-light tracking-tight mb-2 text-center">Verify Authenticity</h1>
            <p class="text-gray-400 text-sm text-center mb-10 max-w-xs font-mono">
                Enter the 12-digit Certilogo (CLG) code found on the inner label.
            </p>

            <div class="w-full relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-gray-700 to-gray-500 rounded-lg blur opacity-30 group-hover:opacity-50 transition duration-500"></div>
                <div class="relative bg-brand-black border border-white/10 rounded-lg p-1 flex">
                    <input type="text" id="clg-input" placeholder="KALA - XXXX - XXXX" 
                           class="w-full bg-transparent text-white font-mono text-center text-lg py-4 px-2 outline-none uppercase tracking-[0.2em] placeholder-gray-700">
                </div>
            </div>

            <button id="btn-verify" class="mt-6 w-full bg-white text-black font-semibold uppercase tracking-widest text-sm py-4 rounded-lg hover:bg-gray-200 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                Authenticate Now
            </button>
        </div>

        <!-- STEP 2: LOADING / SCANNING ANIMATION -->
        <div id="panel-loading" class="panel">
            <div class="relative w-32 h-32 mb-8">
                <!-- Lingkaran Berputar -->
                <div class="absolute inset-0 border-t-2 border-white rounded-full animate-spin"></div>
                <div class="absolute inset-2 border-r-2 border-gray-500 rounded-full animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
                <!-- Ikon Tengah -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="ph ph-shield-search text-4xl text-white"></i>
                </div>
            </div>

            <h2 class="text-xl font-mono uppercase tracking-widest glitch mb-4" data-text="ANALYZING DATA">ANALYZING DATA</h2>
            
            <!-- Terminal Output Palsu -->
            <div class="w-full bg-brand-dark border border-white/10 rounded p-4 font-mono text-xs text-gray-400 h-32 overflow-hidden flex flex-col justify-end relative">
                <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-brand-dark to-transparent z-10 pointer-events-none"></div>
                <div id="terminal-output" class="space-y-1 relative z-0">
                    <!-- Teks akan di-inject JS -->
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="w-full mt-6">
                <div class="flex justify-between text-[10px] font-mono text-gray-500 mb-1">
                    <span>PROGRESS</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-white w-0 transition-all duration-300 ease-out"></div>
                </div>
            </div>
        </div>

        <!-- STEP 3: RESULT -->
        <div id="panel-result" class="panel">
            
            <!-- Container Hasil (Akan diganti isinya oleh JS) -->
            <div id="result-content" class="w-full flex flex-col items-center text-center">
                <!-- Template Asli / Palsu akan masuk ke sini -->
            </div>

            <button id="btn-reset" class="mt-12 text-sm text-gray-500 hover:text-white font-mono underline underline-offset-4 transition-colors">
                Scan Another Code
            </button>
            
            <a href="index.html" class="mt-6 w-full block text-center border border-white/20 text-white font-semibold uppercase tracking-widest text-sm py-4 rounded-lg hover:bg-white hover:text-black transition-colors">
                Return to Homepage
            </a>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Panels
            const panelInput = document.getElementById('panel-input');
            const panelLoading = document.getElementById('panel-loading');
            const panelResult = document.getElementById('panel-result');

            // Elements
            const clgInput = document.getElementById('clg-input');
            const btnVerify = document.getElementById('btn-verify');
            const btnReset = document.getElementById('btn-reset');
            const scanLine = document.getElementById('scan-line');
            const terminalOutput = document.getElementById('terminal-output');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const resultContent = document.getElementById('result-content');

            // --- Fungsi Transisi Panel ---
            function showPanel(panelToShow) {
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                panelToShow.classList.add('active');
            }

            // --- FITUR AUTO-SCAN (QR CODE) ---
            // Auto-fill dan langsung proses dari URL jika parameter '?code=' tersedia
            const urlParams = new URLSearchParams(window.location.search);
            const codeFromURL = urlParams.get('code');
            
            if (codeFromURL) {
                const autoCode = codeFromURL.replace(/\s+/g, '').toUpperCase();
                clgInput.value = autoCode; // Tetap isi input untuk jaga-jaga (jika di-reset)
                
                // Bypass halaman input, langsung pindah ke halaman loading
                showPanel(panelLoading);
                scanLine.style.animationPlayState = 'running';
                scanLine.style.opacity = '1';
                
                // Jeda 400ms agar efek transisi halaman (fade) terlihat sebelum proses berat dimulai
                setTimeout(() => {
                    runLoadingSequence(autoCode);
                }, 400);
            }

            // --- Logika Tombol Verifikasi (Untuk Input Manual) ---
            btnVerify.addEventListener('click', () => {
                let code = clgInput.value.replace(/\s+/g, '').toUpperCase(); // Hapus spasi
                
                if (code.length < 5) {
                    // Animasi getar (error) singkat
                    clgInput.parentElement.classList.add('translate-x-1', 'border-red-500');
                    setTimeout(() => clgInput.parentElement.classList.remove('translate-x-1', 'border-red-500'), 200);
                    return;
                }

                // 1. Pindah ke Halaman Loading
                showPanel(panelLoading);
                scanLine.style.animationPlayState = 'running';
                scanLine.style.opacity = '1';

                // 2. Jalankan Animasi Terminal & Progress Bar
                runLoadingSequence(code);
            });

            // --- Logika Tombol Reset ---
            btnReset.addEventListener('click', () => {
                clgInput.value = '';
                showPanel(panelInput);
            });

            // --- Fungsi Simulasi Proses Loading (Hacking/Scanning Vibe) ---
            function runLoadingSequence(code) {
                terminalOutput.innerHTML = '';
                progressBar.style.width = '0%';
                progressText.innerText = '0%';

                const terminalLines = [
                    `> INITIALIZING KALA_AUTH_PROTO...`,
                    `> ESTABLISHING SECURE CONNECTION...`,
                    `> FETCHING DATABASE RECORDS...`,
                    `> QUERY: CHECK_CLG [${code}]`,
                    `> VALIDATING CRYPTOGRAPHIC HASH...`,
                    `> CROSS-REFERENCING BATCH LOGS...`,
                    `> DECRYPTING RFID SIGNATURE...`,
                    `> FINALIZING RESULTS...`
                ];

                let lineIndex = 0;
                let progress = 0;
                
                // Interval untuk mengupdate Terminal
                const terminalInterval = setInterval(() => {
                    if (lineIndex < terminalLines.length) {
                        const div = document.createElement('div');
                        div.className = 'text-green-500'; // Warna teks terminal
                        // Ketik teks per huruf (efek mesin tik simpel)
                        div.innerText = terminalLines[lineIndex];
                        terminalOutput.appendChild(div);
                        
                        // Auto scroll ke bawah
                        if (terminalOutput.children.length > 5) {
                            terminalOutput.removeChild(terminalOutput.firstChild);
                        }
                        lineIndex++;
                    }
                }, 400); // Munculkan line baru tiap 400ms

                // Interval untuk Progress Bar
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 15; // Naik random
                    if (progress > 100) progress = 100;
                    
                    progressBar.style.width = `${progress}%`;
                    progressText.innerText = `${Math.floor(progress)}%`;

                    if (progress === 100) {
                        clearInterval(terminalInterval);
                        clearInterval(progressInterval);
                        
                        // Jeda sejenak di 100% sebelum menampilkan hasil
                        setTimeout(() => {
                            scanLine.style.opacity = '0';
                            checkAuthenticity(code);
                        }, 500);
                    }
                }, 300); // Update progress tiap 300ms
            }

            // --- Logika Pengecekan Hasil Akhir ---
            function checkAuthenticity(code) {
                let isAuthentic = false;

                // LOGIKA BISNIS BARU:
                // Mengecek format "KALA-" yang diikuti oleh angka saja
                const match = code.match(/^KALA-(\d+)$/);

                if (match) {
                    // Jika format cocok, ambil angkanya dan ubah ke Integer
                    const serialNumber = parseInt(match[1], 10);
                    
                    // Verifikasi apakah angkanya 1 sampai 100
                    if (serialNumber >= 1 && serialNumber <= 100) {
                        isAuthentic = true;
                    }
                }

                // Tampilkan hasil berdasarkan status
                if (isAuthentic) {
                    renderResult(true, code);
                } else {
                    renderResult(false, code);
                }

                showPanel(panelResult);
            }

            // --- Merender UI Hasil (Asli/Palsu) ---
            function renderResult(isAuthentic, code) {
                if (isAuthentic) {
                    resultContent.innerHTML = `
                        <div class="w-32 h-32 rounded-full bg-green-500/10 flex items-center justify-center mb-6 pulse-authentic">
                            <i class="ph-fill ph-check-circle text-7xl text-green-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold uppercase tracking-tight text-white mb-2">Authentic</h2>
                        <p class="text-green-400 font-mono text-sm mb-6 border border-green-500/30 bg-green-500/10 px-4 py-1 rounded">
                            CODE: ${code}
                        </p>
                        <div class="bg-white/5 border border-white/10 rounded-lg p-6 text-left max-w-sm w-full backdrop-blur-sm">
                            <h3 class="font-semibold text-white mb-2 flex items-center gap-2">
                                <i class="ph-fill ph-shield-check text-green-500"></i> Verifikasi Berhasil
                            </h3>
                            <p class="text-sm text-gray-400 leading-relaxed">
                                Barang ini telah diverifikasi sebagai produk resmi <strong>KALA FIGHTWARE</strong>. Dirancang dan diproduksi dengan standar kualitas tertinggi.
                            </p>
                        </div>
                    `;
                } else {
                    resultContent.innerHTML = `
                        <div class="w-32 h-32 rounded-full bg-red-500/10 flex items-center justify-center mb-6 pulse-fake">
                            <i class="ph-fill ph-warning text-7xl text-red-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold uppercase tracking-tight text-red-500 mb-2">Counterfeit</h2>
                        <p class="text-red-400 font-mono text-sm mb-6 border border-red-500/30 bg-red-500/10 px-4 py-1 rounded">
                            CODE: ${code}
                        </p>
                        <div class="bg-white/5 border border-white/10 rounded-lg p-6 text-left max-w-sm w-full backdrop-blur-sm">
                            <h3 class="font-semibold text-white mb-2 flex items-center gap-2">
                                <i class="ph-fill ph-warning-circle text-red-500"></i> Peringatan Sistem
                            </h3>
                            <p class="text-sm text-gray-400 leading-relaxed">
                                Kode tidak ditemukan dalam database resmi kami. Barang ini terindikasi palsu. Jangan terima produk ini jika Anda belum melakukan pembayaran.
                            </p>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
